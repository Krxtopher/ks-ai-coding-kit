# Catalog of available KS AI Coding Kit extensions.
# Each entry defines an installable item with its source path,
# description, and per-tool install targets.
#
# Target paths are relative to the user's project root (--dest).
# A null target means the item is not compatible with that tool.
#
# Append-mode targets support a prioritized file list:
#   claude-code: { file: [CLAUDE.md, AGENTS.md], mode: append }
# The installer uses the first file that exists in the destination,
# falling back to the last entry if none exist.
#
# steering-roots defines the per-tool file used for steering-inject
# content from skills. Supports the same prioritized list syntax.
# Defaults to AGENTS.md for any tool not listed here.

steering-roots:
  claude-code: [CLAUDE.md, AGENTS.md]

items:
  - name: agent-memory
    type: skill
    source: skills/agent-memory
    description: Persistent AI memory system with project-scoped and user-scoped memory files
    compatibility: [kiro, claude-code, codex, cursor]
    targets:
      kiro: .kiro/skills/agent-memory
      claude-code: .claude/skills/agent-memory
      codex: .agents/skills/agent-memory
      cursor: .agents/skills/agent-memory

  - name: doc-convert
    type: skill
    source: skills/doc-convert
    description: Convert documents between formats using pandoc with a styled Word reference template
    compatibility: [kiro, claude-code, codex, cursor]
    targets:
      kiro: .kiro/skills/doc-convert
      claude-code: .claude/skills/doc-convert
      codex: .agents/skills/doc-convert
      cursor: .agents/skills/doc-convert

  - name: current-time
    type: skill
    source: skills/current-time
    description: Looks up the current date and time in both local time and UTC, accurate to the second
    compatibility: [kiro, claude-code, codex, cursor]
    targets:
      kiro: .kiro/skills/current-time
      claude-code: .claude/skills/current-time
      codex: .agents/skills/current-time
      cursor: .agents/skills/current-time

  - name: bedrock-vision
    type: skill
    source: skills/bedrock-vision
    description: Analyze images from the workspace using Bedrock vision models and extract technical metadata
    compatibility: [kiro, claude-code, codex, cursor]
    targets:
      kiro: .kiro/skills/bedrock-vision
      claude-code: .claude/skills/bedrock-vision
      codex: .agents/skills/bedrock-vision
      cursor: .agents/skills/bedrock-vision

  - name: shell-command-explainer
    type: hook
    source: hooks/shell-command-explainer.kiro.hook
    description: Explains shell commands before execution with safety/trust analysis
    compatibility: [kiro]
    targets:
      kiro: .kiro/hooks/shell-command-explainer.kiro.hook

  - name: documentation-standards
    type: instruction
    source: agent-instructions/documentation-standards.md
    description: Guidelines for when and how to update README.md and agent-facing docs
    compatibility: [kiro, claude-code, codex, cursor]
    targets:
      kiro: { file: AGENTS.md, mode: append }
      claude-code: { file: [CLAUDE.md, AGENTS.md], mode: append }
      codex: { file: AGENTS.md, mode: append }
      cursor: { file: AGENTS.md, mode: append }
